<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404食堂 | 代码能跑，菜也能做</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <!-- RemixIcon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        python: '#3776ab',
                        java: '#f89820',
                        cpp: '#00599C',
                        js: '#f7df1e',
                        go: '#00ADD8',
                        rust: '#CE422B',
                        kotlin: '#7F52FF',
                        community: '#EC4899',
                        dark: '#0a0a0f',
                        'dark-card': '#12121a',
                    },
                    fontFamily: {
                        code: ['Fira Code', 'monospace'],
                        sans: ['Noto Sans SC', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(255,255,255,0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(255,255,255,0.6), 0 0 30px rgba(255,255,255,0.4)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/detail.css">
    <link rel="stylesheet" href="css/welcome.css">
    <link rel="stylesheet" href="css/features.css">
    <link rel="stylesheet" href="css/easter.css">
    <link rel="stylesheet" href="css/compile.css">
    <link rel="stylesheet" href="css/kling.css">
</head>
<body>
    <!-- 背景粒子 -->
    <div id="particles-js"></div>

    <!-- 代码雨 Canvas -->
    <canvas id="code-rain"></canvas>

    <!-- 页面头部 -->
    <header class="relative z-10 py-6 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-2 font-code" id="siteTitle">
                <span class="bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    &lt;404食堂/&gt;
                </span>
            </h1>

            <p class="text-base md:text-lg text-gray-400 mb-4 max-w-2xl mx-auto">
                代码能跑，菜也能做
                <span class="text-xs text-gray-500 ml-2">404 Not Found → 404食堂 Found</span>
            </p>

            <!-- 语言分类标签（放在 header 内，确保首屏可见） -->
            <div class="flex flex-wrap justify-center gap-3 mb-4">
                <button onclick="switchTab('python')"
                    class="tab-btn active tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="python" data-active-border="border-blue-500" data-active-text="text-blue-300" data-active-bg="bg-blue-500/15" data-active-shadow="shadow-blue-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-braces-line"></i>
                        Python
                    </span>
                </button>
                <button onclick="switchTab('java')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="java" data-active-border="border-orange-500" data-active-text="text-orange-300" data-active-bg="bg-orange-500/15" data-active-shadow="shadow-orange-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-cup-line"></i>
                        Java
                    </span>
                </button>
                <button onclick="switchTab('cpp')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="cpp" data-active-border="border-cyan-500" data-active-text="text-cyan-300" data-active-bg="bg-cyan-500/15" data-active-shadow="shadow-cyan-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-flashlight-line"></i>
                        C++
                    </span>
                </button>
                <button onclick="switchTab('javascript')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="javascript" data-active-border="border-yellow-500" data-active-text="text-yellow-300" data-active-bg="bg-yellow-500/15" data-active-shadow="shadow-yellow-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-javascript-line"></i>
                        JavaScript
                    </span>
                </button>
                <button onclick="switchTab('go')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="go" data-active-border="border-sky-500" data-active-text="text-sky-300" data-active-bg="bg-sky-500/15" data-active-shadow="shadow-sky-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-speed-line"></i>
                        Go
                    </span>
                </button>
                <button onclick="switchTab('rust')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="rust" data-active-border="border-red-500" data-active-text="text-red-300" data-active-bg="bg-red-500/15" data-active-shadow="shadow-red-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-shield-cross-line"></i>
                        Rust
                    </span>
                </button>
                <button onclick="switchTab('kotlin')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="kotlin" data-active-border="border-violet-500" data-active-text="text-violet-300" data-active-bg="bg-violet-500/15" data-active-shadow="shadow-violet-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-leaf-line"></i>
                        Kotlin
                    </span>
                </button>
                <button onclick="switchTab('community')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="community" data-active-border="border-pink-500" data-active-text="text-pink-300" data-active-bg="bg-pink-500/15" data-active-shadow="shadow-pink-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-group-line"></i>
                        社区
                    </span>
                </button>
                <button onclick="switchTab('favorites')"
                    class="tab-btn tab-text px-6 py-3 rounded-2xl font-medium font-code text-sm border-2 border-gray-600 text-gray-300 bg-gray-900/70 shadow-lg transition-all"
                    data-lang="favorites" data-active-border="border-rose-500" data-active-text="text-rose-300" data-active-bg="bg-rose-500/15" data-active-shadow="shadow-rose-500/20">
                    <span class="flex items-center gap-2">
                        <i class="ri-heart-line"></i>
                        收藏
                    </span>
                </button>
            </div>

            <!-- 搜索框 -->
            <div class="search-container max-w-md mx-auto mb-3">
                <i class="ri-search-line search-icon"></i>
                <input
                    type="text"
                    class="search-input"
                    placeholder="搜索关键字、菜名或编程语言..."
                    id="searchInput"
                >
            </div>

            <!-- 今日推荐 -->
            <div id="dailyCard" class="daily-card"></div>

            <!-- 主题切换 + 统计 -->
            <div class="flex justify-center items-center gap-6">
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-500">浅色</span>
                    <div class="theme-toggle" id="themeToggle"></div>
                    <span class="text-xs text-gray-500">深色</span>
                </div>
                <span class="text-xs text-gray-600">|</span>
                <span class="text-xs text-gray-500"><span id="recipeCount">共 12 道菜谱</span> · <span id="currentLang">当前：Python 专区</span></span>
            </div>
        </div>
    </header>

    <!-- 菜谱内容区 -->
    <main class="relative z-10 px-6 pb-20">
        <div class="max-w-7xl mx-auto">
            <!-- Python 专区 -->
            <section id="section-python" class="fade-in">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- Java 专区 -->
            <section id="section-java" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- C++ 专区 -->
            <section id="section-cpp" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- JavaScript 专区 -->
            <section id="section-javascript" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- Go 专区 -->
            <section id="section-go" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- Rust 专区 -->
            <section id="section-rust" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- Kotlin 专区 -->
            <section id="section-kotlin" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- 社区专区 -->
            <section id="section-community" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- 收藏专区 -->
            <section id="section-favorites" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- 无搜索结果提示 -->
            <div id="noResults" class="hidden text-center py-20">
                <i class="ri-emotion-unhappy-line text-6xl text-gray-600 mb-4"></i>
                <p class="text-xl text-gray-400">没有找到匹配的菜谱</p>
                <p class="text-sm text-gray-500 mt-2">试试搜索其他关键字吧</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="relative z-10 py-8 px-6 border-t border-gray-800">
        <div class="max-w-7xl mx-auto text-center">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-gray-500 text-sm">
                    <span class="font-code">Made with</span>
                    <span class="text-red-500 animate-pulse"> ♥ </span>
                    <span class="font-code">&</span>
                    <span class="text-yellow-500">🍳</span>
                    <span class="font-code">by Programmers</span>
                </div>

                <div class="flex gap-6">
                    <a href="#" class="text-gray-500 hover:text-white transition-colors">
                        <i class="ri-github-line text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 hover:text-white transition-colors">
                        <i class="ri-twitter-line text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 hover:text-white transition-colors">
                        <i class="ri-star-line text-xl"></i>
                    </a>
                </div>

                <div class="text-gray-600 text-sm font-code">
                    © 2024 404食堂 | 代码能跑，菜也能做
                </div>
            </div>
        </div>
    </footer>

    <!-- Toast 通知 -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full text-white font-medium shadow-2xl opacity-0 translate-y-4 transition-all duration-300 z-50">
        <span id="toastMessage"></span>
    </div>

    <!-- 欢迎弹窗 -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div class="welcome-card">
            <span class="welcome-icon">🍳</span>
            <h2 class="welcome-title">Programmer's Cookbook</h2>
            <p class="welcome-desc">
                用编程语言的<strong style="color:#ccc">关键字</strong>来命名一道道美食<br>
                当代码遇上烟火气，每一行都值得被用心烹饪<br>
                浏览 7 种语言、28+ 道菜谱，或投稿你自己的创意！
            </p>
            <div class="welcome-features">
                <div class="welcome-feature">
                    <div class="welcome-feature-icon bg-blue-500/15 text-blue-400"><i class="ri-code-s-slash-line"></i></div>
                    <span class="welcome-feature-text">关键字菜谱</span>
                </div>
                <div class="welcome-feature">
                    <div class="welcome-feature-icon bg-green-500/15 text-green-400"><i class="ri-play-circle-line"></i></div>
                    <span class="welcome-feature-text">制作助手</span>
                </div>
                <div class="welcome-feature">
                    <div class="welcome-feature-icon bg-pink-500/15 text-pink-400"><i class="ri-quill-pen-line"></i></div>
                    <span class="welcome-feature-text">自由投稿</span>
                </div>
            </div>
            <button class="welcome-btn" onclick="closeWelcome()">
                开始探索
            </button>
        </div>
    </div>

    <!-- 投稿弹窗 -->
    <div id="submitOverlay" class="submit-overlay">
        <div class="submit-card">
            <div class="submit-header">
                <h2><i class="ri-quill-pen-line"></i> 投稿菜谱</h2>
                <button class="modal-close" onclick="closeSubmitModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="submit-body">
                <form id="submitForm" onsubmit="event.preventDefault(); submitRecipe();">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">编程语言 <span class="required">*</span></label>
                            <select class="form-select" id="submitLang">
                                <option value="python">Python</option>
                                <option value="java">Java</option>
                                <option value="cpp">C++</option>
                                <option value="javascript">JavaScript</option>
                                <option value="go">Go</option>
                                <option value="rust">Rust</option>
                                <option value="kotlin">Kotlin</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">关键字 <span class="required">*</span></label>
                            <input type="text" class="form-input" id="submitKeyword" placeholder="如：async, map, try...">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">菜品名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="submitDishName" placeholder="如：宫保鸡丁、提拉米苏...">
                    </div>

                    <div class="form-group">
                        <label class="form-label">关键字释义</label>
                        <input type="text" class="form-input" id="submitDefinition" placeholder="简要解释这个关键字的含义...">
                    </div>

                    <div class="form-group">
                        <label class="form-label">创意描述 <span class="required">*</span></label>
                        <textarea class="form-textarea" id="submitCreativity" placeholder="为什么用这个关键字来命名这道菜？有什么有趣的关联？"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">难度</label>
                            <select class="form-select" id="submitDifficulty">
                                <option value="⭐ 简单">简单</option>
                                <option value="⭐⭐ 中等" selected>中等</option>
                                <option value="⭐⭐⭐ 较难">较难</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">预计用时</label>
                            <input type="text" class="form-input" id="submitTime" placeholder="如：30分钟">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">热量</label>
                        <input type="text" class="form-input" id="submitCalories" placeholder="如：350kcal">
                    </div>

                    <div class="form-group">
                        <label class="form-label">主料 <span class="form-hint">（每行一种）</span></label>
                        <textarea class="form-textarea" id="submitMain" style="min-height:60px" placeholder="鸡胸肉 200g&#10;西兰花 150g"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">辅料</label>
                            <textarea class="form-textarea" id="submitAux" style="min-height:50px" placeholder="生姜 3片&#10;大蒜 2瓣"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">调料</label>
                            <textarea class="form-textarea" id="submitSeasoning" style="min-height:50px" placeholder="盐 适量&#10;生抽 1汤匙"></textarea>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">烹饪步骤 <span class="required">*</span></label>
                        <div class="step-inputs" id="stepInputs">
                            <div class="step-input-row" data-step="1">
                                <span class="step-input-num">01</span>
                                <input type="text" class="form-input step-input" placeholder="描述这一步的操作...">
                                <button class="step-remove-btn" onclick="removeStep(this)" title="删除此步"><i class="ri-close-line"></i></button>
                            </div>
                        </div>
                        <button type="button" class="add-step-btn" onclick="addStep()">
                            <i class="ri-add-line"></i> 添加步骤
                        </button>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="ri-send-plane-fill"></i> 提交菜谱
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 浮动按钮组 -->
    <div class="fab-group">
        <button class="fab-btn fab-ai" onclick="openAIGenModal()" title="AI 生成菜谱">
            <i class="ri-robot-2-line"></i>
        </button>
        <button class="fab-btn fab-submit" onclick="openSubmitModal()" title="投稿菜谱">
            <i class="ri-quill-pen-line"></i>
        </button>
    </div>

    <!-- 菜谱详情模态框 -->
    <div id="recipeModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <span class="modal-keyword font-code text-sm text-blue-400">keyword</span>
                            <span class="modal-difficulty text-xs px-2 py-1 bg-white/10 rounded-full text-gray-400">难度</span>
                        </div>
                        <div class="modal-dish-name text-xl font-bold bg-gradient-to-r from-blue-500 to-blue-700 bg-clip-text text-transparent">
                            菜品名
                        </div>
                    </div>
                    <button class="modal-close" onclick="closeRecipeDetail()">
                        <i class="ri-close-line"></i>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- 可灵 API 配置（本地密钥，不提交到 GitHub） -->
    <script src="js/config.js?v=12"></script>

    <!-- 业务脚本：按依赖顺序加载 -->
    <script src="js/data.js?v=12"></script>
    <script src="js/effects.js?v=12"></script>
    <script src="js/ui.js?v=12"></script>
    <script src="js/detail.js?v=12"></script>
    <script src="js/welcome.js?v=12"></script>
    <script src="js/features.js?v=12"></script>
    <script src="js/easter.js?v=12"></script>
    <script src="js/compile.js?v=12"></script>
    <script src="js/aigen.js?v=12"></script>
    <script src="js/kling.js?v=12"></script>
    <script src="js/main.js?v=12"></script>
</body>
</html>
