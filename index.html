<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmer's Cookbook - 程序员关键字菜谱</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <!-- RemixIcon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        python: '#3776ab',
                        java: '#f89820',
                        cpp: '#00599C',
                        js: '#f7df1e',
                        dark: '#0a0a0f',
                        'dark-card': '#12121a',
                    },
                    fontFamily: {
                        code: ['Fira Code', 'monospace'],
                        sans: ['Noto Sans SC', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(255,255,255,0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(255,255,255,0.6), 0 0 30px rgba(255,255,255,0.4)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow-x: hidden;
            cursor: none;
        }

        /* 自定义光标 */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            mix-blend-mode: difference;
        }

        .custom-cursor-dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        .custom-cursor.hover {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* 背景粒子 */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* 代码雨背景 */
        #code-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        /* 玻璃态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: left 0.6s ease;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(255, 255, 255, 0.05);
        }

        /* 标签页 */
        .tab-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: currentColor;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .tab-btn.active::after {
            width: 80%;
        }

        .tab-btn:hover::after {
            width: 80%;
        }

        /* 关键字高亮 */
        .keyword-glow {
            text-shadow:
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 40px currentColor;
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* 步骤编号 */
        .step-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Fira Code', monospace;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* 原料标签 */
        .ingredient-chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: default;
        }

        .ingredient-chip:hover {
            transform: scale(1.1) rotate(2deg);
        }

        /* 复制按钮 */
        .copy-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .copy-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .copy-btn:active::before {
            width: 300px;
            height: 300px;
        }

        /* 搜索框 */
        .search-container {
            position: relative;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px 20px 12px 50px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 500px;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
        }

        /* 主题切换 */
        .theme-toggle {
            width: 60px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            transition: all 0.3s ease;
        }

        .theme-toggle.light::after {
            left: 32px;
            background: #fbbf24;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 加载动画 */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .custom-cursor, .custom-cursor-dot {
                display: none;
            }

            .recipe-grid {
                grid-template-columns: 1fr !important;
            }

            .tab-text {
                font-size: 13px !important;
                padding: 8px 16px !important;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义光标 -->
    <div class="custom-cursor" id="cursor"></div>
    <div class="custom-cursor-dot" id="cursor-dot"></div>

    <!-- 背景粒子 -->
    <div id="particles-js"></div>

    <!-- 代码雨 Canvas -->
    <canvas id="code-rain"></canvas>

    <!-- 页面头部 -->
    <header class="relative z-10 py-12 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <div class="mb-6">
                <span class="inline-block px-4 py-2 bg-gradient-to-r from-purple-500/20 to-pink-500/20 rounded-full text-sm font-code text-purple-300 mb-4 animate-float">
                    🍳 v1.0 · 用代码调味生活
                </span>
            </div>

            <h1 class="text-5xl md:text-7xl font-bold mb-4 font-code">
                <span class="bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    &lt;Programmer's Cookbook/&gt;
                </span>
            </h1>

            <p class="text-xl md:text-2xl text-gray-400 mb-8 max-w-2xl mx-auto">
                当编程语言的关键字遇上人间烟火气<br>
                <span class="text-sm text-gray-500">每一行代码，都值得被用心烹饪</span>
            </p>

            <!-- 搜索框 -->
            <div class="search-container max-w-md mx-auto mb-8">
                <i class="ri-search-line search-icon"></i>
                <input
                    type="text"
                    class="search-input"
                    placeholder="搜索关键字、菜名或编程语言..."
                    id="searchInput"
                >
            </div>

            <!-- 主题切换 -->
            <div class="flex justify-center items-center gap-4">
                <span class="text-sm text-gray-400">浅色模式</span>
                <div class="theme-toggle" id="themeToggle"></div>
                <span class="text-sm text-gray-400">深色模式</span>
            </div>
        </div>
    </header>

    <!-- 语言分类标签 -->
    <nav class="relative z-10 px-6 mb-12">
        <div class="max-w-5xl mx-auto">
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="switchTab('python')"
                    class="tab-btn active tab-text px-8 py-4 rounded-2xl font-medium font-code text-sm md:text-base border border-gray-700 text-gray-300 hover:border-python hover:text-python transition-all bg-gray-900/50"
                    data-lang="python">
                    <span class="flex items-center gap-2">
                        <i class="ri-braces-line text-python"></i>
                        Python
                    </span>
                </button>
                <button onclick="switchTab('java')"
                    class="tab-btn tab-text px-8 py-4 rounded-2xl font-medium font-code text-sm md:text-base border border-gray-700 text-gray-300 hover:border-java hover:text-java transition-all bg-gray-900/50"
                    data-lang="java">
                    <span class="flex items-center gap-2">
                        <i class="ri-cup-line text-java"></i>
                        Java
                    </span>
                </button>
                <button onclick="switchTab('cpp')"
                    class="tab-btn tab-text px-8 py-4 rounded-2xl font-medium font-code text-sm md:text-base border border-gray-700 text-gray-300 hover:border-cpp hover:text-cpp transition-all bg-gray-900/50"
                    data-lang="cpp">
                    <span class="flex items-center gap-2">
                        <i class="ri-flashlight-line text-cpp"></i>
                        C++
                    </span>
                </button>
                <button onclick="switchTab('javascript')"
                    class="tab-btn tab-text px-8 py-4 rounded-2xl font-medium font-code text-sm md:text-base border border-gray-700 text-gray-300 hover:border-js hover:text-js transition-all bg-gray-900/50"
                    data-lang="javascript">
                    <span class="flex items-center gap-2">
                        <i class="ri-javascript-line text-js"></i>
                        JavaScript
                    </span>
                </button>
            </div>

            <!-- 统计信息 -->
            <div class="text-center mt-6 text-sm text-gray-500">
                <span id="recipeCount">共 12 道菜谱</span>
                <span class="mx-2">·</span>
                <span id="currentLang">当前：Python 专区</span>
            </div>
        </div>
    </nav>

    <!-- 菜谱内容区 -->
    <main class="relative z-10 px-6 pb-20">
        <div class="max-w-7xl mx-auto">
            <!-- Python 专区 -->
            <section id="section-python" class="fade-in">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- Java 专区 -->
            <section id="section-java" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- C++ 专区 -->
            <section id="section-cpp" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- JavaScript 专区 -->
            <section id="section-javascript" class="hidden">
                <div class="recipe-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- 无搜索结果提示 -->
            <div id="noResults" class="hidden text-center py-20">
                <i class="ri-emotion-unhappy-line text-6xl text-gray-600 mb-4"></i>
                <p class="text-xl text-gray-400">没有找到匹配的菜谱</p>
                <p class="text-sm text-gray-500 mt-2">试试搜索其他关键字吧</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="relative z-10 py-8 px-6 border-t border-gray-800">
        <div class="max-w-7xl mx-auto text-center">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-gray-500 text-sm">
                    <span class="font-code">Made with</span>
                    <span class="text-red-500 animate-pulse"> ♥ </span>
                    <span class="font-code">&</span>
                    <span class="text-yellow-500">🍳</span>
                    <span class="font-code">by Programmers</span>
                </div>

                <div class="flex gap-6">
                    <a href="#" class="text-gray-500 hover:text-white transition-colors">
                        <i class="ri-github-line text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 hover:text-white transition-colors">
                        <i class="ri-twitter-line text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 hover:text-white transition-colors">
                        <i class="ri-star-line text-xl"></i>
                    </a>
                </div>

                <div class="text-gray-600 text-sm font-code">
                    © 2024 Programmer's Cookbook
                </div>
            </div>
        </div>
    </footer>

    <!-- Toast 通知 -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full text-white font-medium shadow-2xl opacity-0 translate-y-4 transition-all duration-300 z-50">
        <span id="toastMessage"></span>
    </div>

    <script>
        // ==================== 菜谱数据 ====================
        const recipes = {
            python: [
                {
                    keyword: "import",
                    definition: "Python 关键字，用于导入模块或包，将外部功能引入当前命名空间。",
                    creativity: "做菜的第一步往往是"导入"食材——从冰箱/菜市场把原料请进厨房，就像 import 把模块请进代码。没有 import，巧妇难为无米之炊；没有食材，大厨也只能对着空锅发呆。",
                    dishName: "番茄炒蛋",
                    ingredients: {
                        main: ["鸡蛋 4个", "番茄 2个（约300g）"],
                        auxiliary: ["小葱 2根", "大蒜 2瓣"],
                        seasoning: ["食用油 3汤匙", "盐 1茶匙", "白糖 1茶匙", "生抽 1茶匙", "料酒 几滴"]
                    },
                    steps: [
                        "番茄洗净去蒂，切成小块（约2cm见方）；鸡蛋打入碗中，加少许盐（约1/4茶匙）和几滴料酒，用筷子充分搅打至蛋液起泡。",
                        "小葱切葱花，大蒜切末备用。",
                        "热锅倒入2汤匙食用油，油热后（微微冒烟）倒入蛋液，待底部凝固后用锅铲快速划散，炒至金黄蓬松后盛出备用。",
                        "锅中再加1汤匙油，放入蒜末爆香，倒入番茄块中火翻炒，用锅铲轻压番茄使其出汁，炒至番茄软烂呈酱状（约2分钟）。",
                        "将炒好的鸡蛋倒回锅中，与番茄翻炒均匀，加入盐、白糖、生抽调味，继续翻炒1分钟让味道融合。",
                        "关火装盘，撒上葱花点缀，趁热享用。"
                    ],
                    difficulty: "⭐ 简单",
                    time: "10分钟",
                    calories: "280kcal"
                },
                {
                    keyword: "def",
                    definition: "Python 关键字，用于定义函数（define function），将一段可复用的代码封装成命名块。",
                    creativity: "def 是 Python 中定义函数的关键字——把一段逻辑封装起来，随用随调。这道"定义红烧肉"也一样：把五花肉、调料和火候封装进一口锅，定义出人间最治愈的味道。函数可以复用，这道菜可以再来一碗饭。",
                    dishName: "红烧肉",
                    ingredients: {
                        main: ["带皮五花肉 500g"],
                        auxiliary: ["生姜 4片", "大葱 1段", "八角 2个", "香叶 2片", "桂皮 1小段"],
                        seasoning: ["冰糖 30g", "料酒 2汤匙", "生抽 2汤匙", "老抽 1汤匙", "盐 适量", "热水 适量"]
                    },
                    steps: [
                        "五花肉洗净切成3cm见方的块，冷水下锅，加入1汤匙料酒和2片姜，大火煮开后撇去浮沫，捞出用温水冲洗干净，沥干备用。",
                        "锅中不放油，直接放入五花肉块，中小火煸炒至表面微黄、油脂析出，盛出肉块，锅中留少许底油。",
                        "放入冰糖，小火炒至冰糖融化呈琥珀色（糖色），迅速倒入五花肉翻炒，使每块肉均匀裹上糖色。",
                        "加入葱段、姜片、八角、香叶、桂皮，翻炒出香味后，加入生抽、老抽和剩余料酒，翻炒均匀。",
                        "倒入足量热水（没过肉块约2cm），大火烧开后转小火，盖上锅盖慢炖40分钟。",
                        "开盖，根据口味加适量盐，转中火收汁，不停翻炒至汤汁浓稠、肉块红亮，即可出锅。"
                    ],
                    difficulty: "⭐⭐ 中等",
                    time: "60分钟",
                    calories: "520kcal"
                },
                {
                    keyword: "for",
                    definition: "Python 关键字，用于创建 for 循环，对序列（列表、元组、字符串）或可迭代对象进行遍历。",
                    creativity: "for 循环一遍遍遍历序列中的每个元素——就像包饺子时，一张皮、一勺馅、一捏一挤，循环往复，直到所有饺子皮用完。每一次迭代，都是同样的动作，却包出了满满一盘幸福。",
                    dishName: "韭菜鸡蛋饺子",
                    ingredients: {
                        main: ["饺子皮 500g", "韭菜 300g", "鸡蛋 4个"],
                        auxiliary: ["虾皮 30g", "生姜 1小块"],
                        seasoning: ["食用油 3汤匙", "盐 1.5茶匙", "香油 1汤匙", "白胡椒粉 少许"]
                    },
                    steps: [
                        "鸡蛋打散，锅中热2汤匙油，倒入蛋液炒成细碎的金黄蛋花，盛出放凉。",
                        "韭菜摘洗干净，充分沥干水分后切碎；生姜切末；虾皮洗净沥干。",

        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawCodeRain() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = codeChars[Math.floor(Math.random() * codeChars.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;

                document.querySelectorAll('.glass-card').forEach(card => {
                    card.style.display = '';
                });
                document.getElementById('noResults').classList.add('hidden');
                return;

            let foundCount = 0;

            // 遍历所有菜谱
            for (const lang in recipes) {
                recipes[lang].forEach(recipe => {
                    const card = findCardByRecipe(recipe);
                    if (card) {
                        const match =
                            recipe.keyword.toLowerCase().includes(query) ||
                            recipe.dishName.toLowerCase().includes(query) ||
                            recipe.definition.toLowerCase().includes(query) ||
                            lang.toLowerCase().includes(query);

                        if (match) {
                            card.style.display = '';
                            foundCount++;
                        } else {
                            card.style.display = 'none';

            document.getElementById('noResults').classList.toggle('hidden', foundCount > 0);

            const cards = document.querySelectorAll('.glass-card');
            for (const card of cards) {

                    return card;

            return null;

            const btn = event.currentTarget;

            // 找到对应的菜谱数据
            let recipeData = null;
            let langKey = null;
            for (const lang in recipes) {
                const found = recipes[lang].find(r => r.dishName === dishName);
                if (found) {
                    recipeData = found;
                    langKey = lang;
                    break;
                }
            }

            if (!recipeData) return;

            // 组装复制文本
            let text = `【${recipeData.keyword} · ${recipeData.dishName}】\n`;
            text += `难度：${recipeData.difficulty} | 时间：${recipeData.time} | 热量：${recipeData.calories}\n\n`;
            text += `📖 关键字释义：${recipeData.definition}\n\n`;
            text += `💡 取名创意：${recipeData.creativity}\n\n`;
            text += `🥬 原料：\n`;
            text += `  主料：${recipeData.ingredients.main.join('、')}\n`;
            text += `  辅料：${recipeData.ingredients.auxiliary.join('、')}\n`;
            text += `  调料：${recipeData.ingredients.seasoning.join('、')}\n\n`;
            text += `👨‍🍳 做法：\n`;
            recipeData.steps.forEach((step, i) => {
                text += `  ${i + 1}. ${step}\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="ri-check-line"></i> 已复制！';
                showToast(`✅ "${dishName}" 菜谱已复制到剪贴板`);

                    btn.innerHTML = '<i class="ri-file-copy-line"></i> 复制菜谱';
                }, 2000);
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.innerHTML = '<i class="ri-check-line"></i> 已复制！';
                showToast(`✅ "${dishName}" 菜谱已复制到剪贴板`);
                setTimeout(() => {
                    btn.innerHTML = '<i class="ri-file-copy-line"></i> 复制菜谱';
                }, 2000);
            });
        }

                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            // 渲染默认的 Python 标签页
            renderCards('python');

            // 页面加载动画（如果 GSAP 可用）
            if (typeof gsap !== 'undefined') {
                gsap.from('header > div', {
                    opacity: 0,
                    y: 30,
                    duration: 1,
                    ease: 'power2.out'
                });

                gsap.from('.tab-btn', {
                    opacity: 0,
                    y: 20,
                    duration: 0.6,
                    stagger: 0.1,
                    delay: 0.3,
                    ease: 'power2.out'
                });
            }

            // 统计信息
            let totalRecipes = 0;
            for (const lang in recipes) {
                totalRecipes += recipes[lang].length;
            }
            document.getElementById('recipeCount').textContent = `共 ${totalRecipes} 道菜谱`;
        });

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + K 聚焦搜索框
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }

            // 数字键切换标签
            const langKeys = { '1': 'python', '2': 'java', '3': 'cpp', '4': 'javascript' };
            if (langKeys[e.key] && !e.ctrlKey && !e.metaKey) {
                switchTab(langKeys[e.key]);
            }
        });
    </script>
</body>
</html>
